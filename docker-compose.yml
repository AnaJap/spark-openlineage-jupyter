services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez -d marquez"]
      interval: 5s
      timeout: 5s
      retries: 5

  marquez:
    image: marquezproject/marquez:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001

      # ✅ THESE are what the container expects (not MARQUEZ_DB_HOST)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez

  oracle:
    image: gvenzl/oracle-free:23.26.1-slim
    environment:
      ORACLE_PASSWORD: SparkSys123!
      APP_USER: SPARK_APP
      APP_USER_PASSWORD: SparkApp123!
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: marquezproject/marquez-web:latest
    depends_on:
      - marquez
    ports:
      - "3000:3000"
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000

  notebook:
    build: .
    depends_on:
      marquez:
        condition: service_started
      oracle:
        condition: service_healthy
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
    environment:
      JUPYTER_TOKEN: token
      OPENLINEAGE_CONFIG: /home/jovyan/work/notebooks/openlineage.yml
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      ORACLE_SERVICE: FREEPDB1
      ORACLE_USER: SPARK_APP
      ORACLE_PASSWORD: SparkApp123!
      ORACLE_JDBC_URL: jdbc:oracle:thin:@oracle:1521/FREEPDB1

volumes:
  oracle-data:
