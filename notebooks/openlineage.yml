dataset:
  namespaceResolvers:
    oracle_first_endpoint:
      type: patternMatchingGroup
      regex: "^(?<safe>oracle://[^,:/]+(?::\\d+)?)(?:,.*)?(?:/.*)?$"
      matchingGroup: "safe"
    ana_overrided_pg:
      type: pattern
      regex: "^postgres://postgres:5432(?:/.*)?$"
    anas_files:
      type: pattern
      regex: "^file$"
